apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}-create-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      labels:
        app: {{ include "kubernetes-agent.fullname" . }}-create-secret
    spec:
      serviceAccountName: {{ include "kubernetes-agent.fullname" . }}
      restartPolicy: Never
      containers:
        - name: create-secret
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e
              SECRET_NAME="{{ include "kubernetes-agent.fullname" . }}"
              NAMESPACE="{{ .Values.namespace.name }}"

              # Delete existing secret if present
              oc delete secret "$SECRET_NAME" -n "$NAMESPACE" --ignore-not-found=true

              # Create the secret with API keys from Helm values
              oc create secret generic "$SECRET_NAME" -n "$NAMESPACE" \
                --from-literal=openai_api_key="{{ .Values.decisionLlm.apiKey }}" \
                --from-literal=rem_api_key="{{ .Values.remediationLlm.apiKey }}" \
                --from-literal=google_api_key="" \
                --from-literal=github_token="{{ .Values.githubToken }}" \
                --from-literal=google_cloud_project=""

              echo "Secret $SECRET_NAME created successfully in namespace $NAMESPACE"
  backoffLimit: 1
