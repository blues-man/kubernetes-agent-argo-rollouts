apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubernetes-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubernetes-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubernetes-agent.fullname" . }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kubernetes-agent.fullname" . }}-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: openai_api_key
                  optional: true
            - name: REM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: rem_api_key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: google_api_key
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: github_token
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: google_cloud_project
                  optional: true
            - name: GIT_USERNAME
              value: {{ .Values.git.username | quote }}
            - name: GIT_EMAIL
              value: {{ .Values.git.email | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /q/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
